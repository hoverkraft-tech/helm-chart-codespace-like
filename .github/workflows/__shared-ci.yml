---
name: Shared - Continuous Integration for common tasks

on: # yamllint disable-line rule:truthy
  workflow_call:

permissions: {}

jobs:
  linter:
    uses: hoverkraft-tech/ci-github-common/.github/workflows/linter.yml@66578f5b9aec4ac5558b5dad750c4c74dfcb65c5 # 0.35.5
    permissions:
      actions: read
      contents: read
      statuses: write
      security-events: write
    with:
      # FIXME: Remove useless linters on next super-linter release
      linter-env: |
        VALIDATE_KUBERNETES_KUBECONFORM=false

  tests-charts:
    name: Tests - Charts
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: Test helm charts
        uses: hoverkraft-tech/ci-github-container/actions/helm/test-chart@5396e1258d209f9af18e55da8692361508e3338c # 0.36.2
        with:
          helm-repositories: |
            bitnami https://charts.bitnami.com/bitnami
            jetstack https://charts.jetstack.io
          helm-set: |
            global.railsSecretKey=\$RAILS_SECRET_KEY
            global.signingKey=\$SIGNING_KEY
            cert-manager.enabled=true
        env:
          RAILS_SECRET_KEY: ${{ secrets.RAILS_SECRET_KEY }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
