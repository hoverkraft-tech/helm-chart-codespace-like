apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "codespace-like.fullname" . }}-test-connection"
  labels:
    {{- include "codespace-like.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command:
        - 'wget'
        - -q
        - -O
        - '/dev/null'
      args:
        - http://{{ include "codespace-like.fullname" . }}:{{ .Values.service.port }}/healthz
  restartPolicy: Never
